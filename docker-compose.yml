services:
  app:
    build: .
    container_name: api360_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - shared_net
    command: php artisan serve --host=0.0.0.0 --port=8000

  reverb:
    build: .
    container_name: api360_reverb
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8088
    ports:
      - "8088:8088"
    volumes:
      - .:/var/www
    depends_on:
      - app
    networks:
      - shared_net

  # worker:
  #   build: .
  #   container_name: api360_worker
  #   command: php artisan queue:work
  #   volumes:
  #     - .:/var/www
  #   environment:
  #     - REDIS_HOST=redis
  #   depends_on:
  #     - app
  #     - redis
  #   networks:
  #     - shared_net

  # redis:
  #   image: redis:7-alpine
  #   container_name: api360_redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - shared_net

  db:
    image: postgres:16-alpine
    container_name: api360_db
    restart: always
    environment:
      POSTGRES_DB: api360_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shared_net

networks:
  shared_net:
    external: true
    name: 360_shared_network

volumes:
  postgres_data:
